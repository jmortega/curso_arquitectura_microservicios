version: "3.9"

# ════════════════════════════════════════════════════════════════════════════
# PLATAFORMA ACADÉMICA — Microservicios
#
#  students-api    → http://localhost:5001   (Swagger)
#  enrollments-api → http://localhost:5002   (Swagger)
#  rabbitmq        → http://localhost:15672  (Management UI)
#                    admin / admin_pass
# ════════════════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────────────────────
  # RABBITMQ — Bus de mensajes asíncrono entre microservicios
  # ─────────────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: academic-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin_pass
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5673:5672"    # AMQP  (5672 ocupado → mapeamos al 5673 del host)
      - "15673:15672"  # Management UI → http://localhost:15673
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - academic-net

  # ─────────────────────────────────────────────────────────────────────────
  # STUDENTS SERVICE — Gestión de alumnos
  # ─────────────────────────────────────────────────────────────────────────
  students-db:
    image: mysql:8.0
    container_name: students-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE:      students_db
      MYSQL_USER:          students_user
      MYSQL_PASSWORD:      students_pass
    ports:
      - "3307:3306"
    volumes:
      - students_db_data:/var/lib/mysql
      - ../students-service-auth/Infrastructure/Persistence/Migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - academic-net

  students-api:
    build:
      context: ../students-service-auth   # carpeta hermana
      dockerfile: Dockerfile
    container_name: students-api
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development   # Development para que Swagger esté disponible
      ConnectionStrings__DefaultConnection: "Server=students-db;Port=3306;Database=students_db;User=students_user;Password=students_pass;"
      RabbitMq__Host:     rabbitmq
      RabbitMq__Port:     5672
      RabbitMq__User:     admin
      RabbitMq__Password: admin_pass
      RabbitMq__Exchange: students-events
    depends_on:
      students-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # wget viene preinstalado en las imágenes aspnet — curl no siempre está
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - academic-net

  # ─────────────────────────────────────────────────────────────────────────
  # ENROLLMENTS SERVICE — Gestión de matrículas (nuevo)
  # ─────────────────────────────────────────────────────────────────────────
  enrollments-db:
    image: mysql:8.0
    container_name: enrollments-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE:      enrollments_db
      MYSQL_USER:          enrollments_user
      MYSQL_PASSWORD:      enrollments_pass
    ports:
      - "3308:3306"
    volumes:
      - enrollments_db_data:/var/lib/mysql
      - ./Infrastructure/Persistence/Migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - academic-net

  enrollments-api:
    build:
      context: .         # el docker-compose.yml está en la raíz del servicio
      dockerfile: Dockerfile
    container_name: enrollments-api
    restart: unless-stopped
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=enrollments-db;Port=3306;Database=enrollments_db;User=enrollments_user;Password=enrollments_pass;"
      Services__StudentsServiceUrl: "http://students-api:8080"
      RabbitMq__Host:     rabbitmq
      RabbitMq__Port:     5672
      RabbitMq__User:     admin
      RabbitMq__Password: admin_pass
      RabbitMq__EnrollmentsExchange:     enrollments-events
      RabbitMq__StudentsExchange:        students-events
      RabbitMq__StudentDeactivatedQueue: enrollments.student-deactivated
      RabbitMq__StudentCreatedQueue:     enrollments.student-created
    depends_on:
      enrollments-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      students-api:
        condition: service_started   # no espera healthy — evita bloqueo por healthcheck de students
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    networks:
      - academic-net

volumes:
  rabbitmq_data:
  students_db_data:
  enrollments_db_data:

networks:
  academic-net:
    driver: bridge
