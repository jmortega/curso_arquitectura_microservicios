version: '3.9'

services:

  students-db:
    image: mysql:8.0
    container_name: students-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: students_db
      MYSQL_USER: students_user
      MYSQL_PASSWORD: students_pass
    ports:
      - "3307:3306"
    volumes:
      - students_db_data:/var/lib/mysql
      - ./Infrastructure/Persistence/Migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  students-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: students-api
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=students-db;Port=3306;Database=students_db;User=students_user;Password=students_pass;
    depends_on:
      students-db:
        condition: service_healthy

volumes:
  students_db_data:

networks:
  academic-net:
    driver: bridge
